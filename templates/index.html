<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siva Nagaraju | Data Analyst & Data Engineer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
  transition: 0.3s;
}

body.dark {
  background: #121212;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: white;
  position: sticky;
  top: 0;
}

body.dark .nav {
  background: #1e1e1e;
}

.nav__list {
  display: flex;
  gap: 20px;
  list-style: none;
}

/* HERO */
.home {
  padding: 100px 50px;
}

.home__content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home__text h1 {
  font-size: 48px;
}

.home__text span {
  color: #007bff;
}

.home__image img {
  width: 300px;
  border-radius: 50%;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* BUTTONS */
.btn {
  background: #007bff;
  color: white;
  padding: 10px 20px;
  border-radius: 5px;
  text-decoration: none;
}

.btn-outline {
  border: 2px solid #007bff;
  padding: 10px 20px;
  color: #007bff;
  border-radius: 5px;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

body.dark .card {
  background: #1e1e1e;
}

.card:hover {
  transform: translateY(-10px);
}

/* SKILLS BAR */
.bar {
  background: #ddd;
  height: 10px;
  border-radius: 5px;
}

.bar span {
  display: block;
  height: 100%;
  background: #007bff;
  width: 0;
  transition: 1s;
}

/* MOBILE */
@media (max-width:768px){
  .home__content {
    flex-direction: column;
    text-align: center;
  }
}

</style>

</head>

<body>

<!-- NAV -->
<header>
<nav class="nav">
  <h2>Siva Nagaraju</h2>

  <ul class="nav__list">
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <button id="darkToggle">🌙</button>
</nav>
</header>

<!-- HERO -->
<section class="home" id="home">
<div class="home__content">

<div class="home__text" data-aos="fade-right">
<h1>Hi, I'm <span>Siva</span></h1>
<h2>Data Analyst | Data Engineer</h2>
<p>Turning data into insights & scalable pipelines.</p>

<a href="#contact" class="btn">Hire Me</a>
</div>

<div class="home__image" data-aos="fade-left">
<img src="{{ url_for('static', filename='img/profile.jpg') }}">
</div>

</div>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>

<div>
<p>SQL</p>
<div class="bar"><span style="width:90%"></span></div>

<p>Power BI</p>
<div class="bar"><span style="width:85%"></span></div>

<p>Python</p>
<div class="bar"><span style="width:80%"></span></div>
</div>

</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>

<div class="projects">

<div class="card" data-aos="zoom-in">
<img src="{{ url_for('static', filename='img/WorkA.jpg') }}">
<h3>Dashboard</h3>
</div>

<div class="card" data-aos="zoom-in">
<img src="{{ url_for('static', filename='img/WorkB.jpg') }}">
<h3>ETL Pipeline</h3>
</div>

</div>

</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>

<form id="contactForm">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>

</section>

<!-- FOOTER -->
<footer>
<p>© Siva Nagaraju</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

/* DARK MODE */
document.getElementById("darkToggle").onclick = () => {
  document.body.classList.toggle("dark");
};

/* SKILL ANIMATION */
window.addEventListener("scroll", () => {
  document.querySelectorAll(".bar span").forEach(bar => {
    bar.style.width = bar.getAttribute("style").split(":")[1];
  });
});
</script>

</body>
</html>
